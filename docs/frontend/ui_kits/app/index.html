<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Jeeb — UI Kit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', sans-serif; transition: background 0.2s; }
  input, select, textarea, button { font-family: 'Inter', sans-serif; }
  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 9999px; }
  body.dark ::-webkit-scrollbar-thumb { background: #334155; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="Layout.jsx"></script>
<script type="text/babel" src="Dashboard.jsx"></script>
<script type="text/babel" src="Workouts.jsx"></script>
<script type="text/babel" src="Study.jsx"></script>
<script type="text/babel" src="Sleep.jsx"></script>
<script type="text/babel" src="Finance.jsx"></script>
<script type="text/babel" src="Calendar.jsx"></script>

<script type="text/babel">
const { useState } = React;

function SettingsPage() {
  const t = window.useTheme();
  const [emailReminders, setEmailReminders] = useState(true);
  const [pushNotifs, setPushNotifs] = useState(false);
  const [theme, setTheme] = useState('Light');
  const inputStyle = { width: '100%', border: `1px solid ${t.border}`, borderRadius: 8, padding: '8px 12px', fontSize: 14, outline: 'none', background: t.inputBg, color: t.fg1, fontFamily: 'inherit' };

  const Section = ({ title, children }) => (
    <div style={{ background: t.surface, border: `1px solid ${t.border}`, borderRadius: 8, marginBottom: 12, overflow: 'hidden' }}>
      <div style={{ padding: '12px 16px', borderBottom: `1px solid ${t.border}`, fontSize: 14, fontWeight: 600, color: t.fg1 }}>{title}</div>
      <div style={{ padding: 16 }}>{children}</div>
    </div>
  );

  const Toggle = ({ value, onChange, label }) => (
    <label style={{ display: 'flex', alignItems: 'center', gap: 10, cursor: 'pointer' }}>
      <div onClick={() => onChange(!value)} style={{ width: 36, height: 20, borderRadius: 9999, background: value ? '#2563EB' : t.borderStrong, position: 'relative', transition: 'background .15s', flexShrink: 0, cursor: 'pointer' }}>
        <div style={{ position: 'absolute', top: 2, left: value ? 18 : 2, width: 16, height: 16, borderRadius: '50%', background: '#fff', boxShadow: '0 1px 2px rgb(0 0 0/.15)', transition: 'left .15s' }} />
      </div>
      <span style={{ fontSize: 14, color: t.fg1 }}>{label}</span>
    </label>
  );

  return (
    <div style={{ maxWidth: 560 }}>
      <h1 style={{ fontSize: 22, fontWeight: 700, color: t.fg1, marginBottom: 20 }}>Settings</h1>
      <Section title="Profile">
        <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
          <div>
            <label style={{ fontSize: 13, fontWeight: 500, color: t.fg1, display: 'block', marginBottom: 4 }}>Display Name</label>
            <input defaultValue="John" style={inputStyle} />
          </div>
          <div>
            <label style={{ fontSize: 13, fontWeight: 500, color: t.fg1, display: 'block', marginBottom: 4 }}>Email</label>
            <input value="john@example.com" readOnly style={{ ...inputStyle, opacity: 0.6, cursor: 'not-allowed' }} />
          </div>
        </div>
      </Section>
      <Section title="Appearance">
        <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
          <span style={{ fontSize: 13, color: t.fg1 }}>Theme</span>
          <select value={theme} onChange={e => setTheme(e.target.value)} style={{ border: `1px solid ${t.border}`, borderRadius: 8, padding: '6px 10px', fontSize: 13, outline: 'none', background: t.inputBg, color: t.fg1, fontFamily: 'inherit' }}>
            <option>Light</option><option>Dark</option><option>System</option>
          </select>
        </div>
      </Section>
      <Section title="Notifications">
        <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
          <Toggle value={emailReminders} onChange={setEmailReminders} label="Email reminders" />
          <Toggle value={pushNotifs} onChange={setPushNotifs} label="Push notifications" />
        </div>
      </Section>
      <Section title="Integrations">
        <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
          {['Google Calendar', 'LINE Notify'].map(name => (
            <div key={name} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
              <span style={{ fontSize: 14, color: t.fg1 }}>{name}</span>
              <button style={{ padding: '6px 14px', border: '1px solid #2563EB', borderRadius: 8, background: t.primarySubtle, fontSize: 13, cursor: 'pointer', color: '#2563EB', fontWeight: 500 }}>Connect</button>
            </div>
          ))}
        </div>
      </Section>
    </div>
  );
}

function App() {
  const savedPage = localStorage.getItem('jeeb-page') || 'dashboard';
  const savedDark = localStorage.getItem('jeeb-dark') === 'true';
  const [page, _setPage] = useState(savedPage);
  const [darkMode, _setDark] = useState(savedDark);

  const setPage = p => { _setPage(p); localStorage.setItem('jeeb-page', p); };
  const toggleDark = () => {
    _setDark(d => {
      const next = !d;
      localStorage.setItem('jeeb-dark', next);
      document.body.classList.toggle('dark', next);
      return next;
    });
  };

  // Apply dark class on mount
  React.useEffect(() => {
    document.body.classList.toggle('dark', darkMode);
    document.body.style.background = darkMode ? '#020617' : '#F8FAFC';
  }, [darkMode]);

  const theme = darkMode ? window.DARK : window.LIGHT;

  const pages = {
    dashboard: <Dashboard onNav={setPage} />,
    workouts:  <Workouts />,
    study:     <Study />,
    sleep:     <Sleep />,
    finance:   <Finance />,
    calendar:  <Calendar />,
    settings:  <SettingsPage />,
  };

  return (
    <window.ThemeCtx.Provider value={theme}>
      <AppLayout page={page} onNav={setPage} darkMode={darkMode} toggleDark={toggleDark}>
        {pages[page] || pages.dashboard}
      </AppLayout>
    </window.ThemeCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>

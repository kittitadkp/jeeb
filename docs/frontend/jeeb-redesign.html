<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jeeb — Redesign</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }
    body {
      background: #090b10;
      color: #e8eaf6;
      font-family: 'Inter', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    h1, h2, h3, h4, h5 { font-family: 'Space Grotesk', sans-serif; }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #1e2130; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #2d3147; }
    input, select, textarea, button { font-family: inherit; }
    button { cursor: pointer; border: none; background: none; }
    a { text-decoration: none; color: inherit; }
    ::selection { background: rgba(124,110,245,0.3); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="jeeb-ui.jsx?v=3"></script>
  <script type="text/babel" src="jeeb-pages1.jsx?v=4"></script>
  <script type="text/babel" src="jeeb-pages2.jsx?v=3"></script>
  <script type="text/babel" src="jeeb-pages3.jsx?v=2"></script>
  <script type="text/babel" src="jeeb-main.jsx?v=4"></script>
</body>
</html>

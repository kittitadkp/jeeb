<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); background: var(--bg); padding: 20px; }
.row { display: flex; gap: 8px; flex-wrap: wrap; }
.swatch { flex: 1; min-width: 60px; border-radius: 6px; height: 56px; display: flex; flex-direction: column; justify-content: flex-end; padding: 6px 8px; }
.swatch span { font-size: 10px; font-weight: 500; }
.label-row { display: flex; gap: 8px; margin-top: 4px; }
.lbl { flex: 1; min-width: 60px; font-size: 10px; color: var(--fg3); text-align: center; }
</style>
</head><body>
<div class="row">
  <div class="swatch" style="background:#EFF6FF"><span style="color:#1E3A8A">50</span></div>
  <div class="swatch" style="background:#DBEAFE"><span style="color:#1E3A8A">100</span></div>
  <div class="swatch" style="background:#BFDBFE"><span style="color:#1E3A8A">200</span></div>
  <div class="swatch" style="background:#93C5FD"><span style="color:#1E3A8A">300</span></div>
  <div class="swatch" style="background:#60A5FA"><span style="color:#1E3A8A">400</span></div>
  <div class="swatch" style="background:#3B82F6"><span style="color:#fff">500</span></div>
  <div class="swatch" style="background:#2563EB"><span style="color:#fff">600 ★</span></div>
  <div class="swatch" style="background:#1D4ED8"><span style="color:#fff">700</span></div>
  <div class="swatch" style="background:#1E40AF"><span style="color:#fff">800</span></div>
  <div class="swatch" style="background:#1E3A8A"><span style="color:#fff">900</span></div>
  <div class="swatch" style="background:#172554"><span style="color:#fff">950</span></div>
</div>
<div class="label-row">
  <div class="lbl">#EFF6FF</div><div class="lbl">#DBEAFE</div><div class="lbl">#BFDBFE</div>
  <div class="lbl">#93C5FD</div><div class="lbl">#60A5FA</div><div class="lbl">#3B82F6</div>
  <div class="lbl">#2563EB</div><div class="lbl">#1D4ED8</div><div class="lbl">#1E40AF</div>
  <div class="lbl">#1E3A8A</div><div class="lbl">#172554</div>
</div>
</body></html>

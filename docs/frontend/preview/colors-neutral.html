<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); background: var(--bg); padding: 20px; }
.row { display: flex; gap: 8px; flex-wrap: wrap; }
.swatch { flex: 1; min-width: 60px; border-radius: 6px; height: 56px; display: flex; flex-direction: column; justify-content: flex-end; padding: 6px 8px; }
.swatch span { font-size: 10px; font-weight: 500; }
.label-row { display: flex; gap: 8px; margin-top: 4px; }
.lbl { flex: 1; min-width: 60px; font-size: 10px; color: var(--fg3); text-align: center; }
</style>
</head><body>
<div class="row">
  <div class="swatch" style="background:#F8FAFC"><span style="color:#334155">50</span></div>
  <div class="swatch" style="background:#F1F5F9"><span style="color:#334155">100</span></div>
  <div class="swatch" style="background:#E2E8F0"><span style="color:#334155">200</span></div>
  <div class="swatch" style="background:#CBD5E1"><span style="color:#334155">300</span></div>
  <div class="swatch" style="background:#94A3B8"><span style="color:#fff">400</span></div>
  <div class="swatch" style="background:#64748B"><span style="color:#fff">500</span></div>
  <div class="swatch" style="background:#475569"><span style="color:#fff">600 ★</span></div>
  <div class="swatch" style="background:#334155"><span style="color:#fff">700</span></div>
  <div class="swatch" style="background:#1E293B"><span style="color:#fff">800</span></div>
  <div class="swatch" style="background:#0F172A"><span style="color:#fff">900</span></div>
  <div class="swatch" style="background:#020617"><span style="color:#fff">950</span></div>
</div>
<div class="label-row">
  <div class="lbl">#F8FAFC</div><div class="lbl">#F1F5F9</div><div class="lbl">#E2E8F0</div>
  <div class="lbl">#CBD5E1</div><div class="lbl">#94A3B8</div><div class="lbl">#64748B</div>
  <div class="lbl">#475569</div><div class="lbl">#334155</div><div class="lbl">#1E293B</div>
  <div class="lbl">#0F172A</div><div class="lbl">#020617</div>
</div>
</body></html>

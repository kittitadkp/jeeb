<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); background: var(--bg); padding: 20px; display: flex; flex-direction: column; gap: 12px; }
.row { display: flex; align-items: baseline; gap: 16px; }
.tag { font-size: 10px; color: var(--fg3); min-width: 72px; text-align: right; }
</style>
</head><body>
<div class="row"><div class="tag">3xl / 700</div><div style="font-size:30px;font-weight:700;color:#0F172A;line-height:1.25">Page Heading</div></div>
<div class="row"><div class="tag">2xl / 600</div><div style="font-size:24px;font-weight:600;color:#0F172A;line-height:1.25">Section Title</div></div>
<div class="row"><div class="tag">xl / 600</div><div style="font-size:20px;font-weight:600;color:#0F172A;line-height:1.375">Card Heading</div></div>
<div class="row"><div class="tag">lg / 600</div><div style="font-size:18px;font-weight:600;color:#0F172A;line-height:1.375">Sub-heading</div></div>
<div class="row"><div class="tag">base / 500</div><div style="font-size:16px;font-weight:500;color:#0F172A;line-height:1.5">Label / Emphasis</div></div>
<div class="row"><div class="tag">sm / 400</div><div style="font-size:14px;font-weight:400;color:#475569;line-height:1.5">Body small / meta text</div></div>
<div class="row"><div class="tag">xs / 400</div><div style="font-size:12px;font-weight:400;color:#94A3B8;line-height:1.5">Caption / timestamp / helper</div></div>
</body></html>

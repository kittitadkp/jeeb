<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); background: var(--bg); padding: 20px; }
.grid { display: grid; grid-template-columns: repeat(11, 1fr); gap: 6px; align-items: center; }
.label { font-size: 10px; color: var(--fg3); white-space: nowrap; }
.bar { border-radius: 4px; height: 28px; }
.val { font-size: 10px; color: var(--fg2); text-align: center; }
</style>
</head><body>
<div class="grid">
  <div class="label">space-1</div><div class="label">space-2</div><div class="label">space-3</div>
  <div class="label">space-4</div><div class="label">space-5</div><div class="label">space-6</div>
  <div class="label">space-8</div><div class="label">space-10</div><div class="label">space-12</div>
  <div class="label">space-16</div><div class="label"></div>
  <div class="bar" style="background:#2563EB;width:4px;height:28px;"></div>
  <div class="bar" style="background:#2563EB;width:8px;height:28px;"></div>
  <div class="bar" style="background:#2563EB;width:12px;height:28px;"></div>
  <div class="bar" style="background:#2563EB;width:16px;height:28px;"></div>
  <div class="bar" style="background:#2563EB;width:20px;height:28px;"></div>
  <div class="bar" style="background:#2563EB;width:24px;height:28px;"></div>
  <div class="bar" style="background:#2563EB;width:32px;height:28px;"></div>
  <div class="bar" style="background:#2563EB;width:40px;height:28px;"></div>
  <div class="bar" style="background:#2563EB;width:48px;height:28px;"></div>
  <div class="bar" style="background:#2563EB;width:64px;height:28px;"></div>
  <div></div>
  <div class="val">4px</div><div class="val">8px</div><div class="val">12px</div>
  <div class="val">16px</div><div class="val">20px</div><div class="val">24px</div>
  <div class="val">32px</div><div class="val">40px</div><div class="val">48px</div>
  <div class="val">64px</div><div></div>
</div>
<div style="margin-top:16px;display:flex;gap:12px;align-items:center;flex-wrap:wrap">
  <span style="font-size:10px;color:var(--fg3);width:72px">Border radius</span>
  <div style="display:flex;gap:12px;align-items:center">
    <div style="background:#2563EB;width:32px;height:32px;border-radius:4px"></div>
    <div style="font-size:10px;color:var(--fg2)">sm 4px</div>
    <div style="background:#2563EB;width:32px;height:32px;border-radius:8px"></div>
    <div style="font-size:10px;color:var(--fg2)">lg 8px ★</div>
    <div style="background:#2563EB;width:32px;height:32px;border-radius:12px"></div>
    <div style="font-size:10px;color:var(--fg2)">xl 12px</div>
    <div style="background:#2563EB;width:32px;height:32px;border-radius:9999px"></div>
    <div style="font-size:10px;color:var(--fg2)">full</div>
  </div>
</div>
</body></html>

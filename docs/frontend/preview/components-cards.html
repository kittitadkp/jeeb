<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); background: var(--bg); padding: 20px; display: flex; gap: 16px; flex-wrap: wrap; align-items: flex-start; }
.card { background: #fff; border-radius: 8px; box-shadow: 0 1px 2px 0 rgb(0 0 0/0.05); overflow: hidden; }
/* Stat Card */
.stat-card { padding: 16px; min-width: 140px; }
.stat-icon { font-size: 18px; margin-bottom: 6px; }
.stat-value { font-size: 28px; font-weight: 700; color: #0F172A; line-height: 1; }
.stat-label { font-size: 12px; color: #64748B; margin-top: 4px; }
.stat-change { font-size: 12px; margin-top: 6px; font-weight: 500; }
.up { color: #16A34A; } .down { color: #DC2626; }
/* Content Card */
.content-card { width: 220px; }
.card-header { padding: 14px 16px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #E2E8F0; }
.card-title { font-size: 14px; font-weight: 600; color: #0F172A; }
.card-body { padding: 14px 16px; font-size: 13px; color: #475569; line-height: 1.5; }
.badge { display: inline-flex; align-items: center; border-radius: 9999px; padding: 2px 8px; font-size: 11px; font-weight: 500; }
</style>
</head><body>
<div class="card stat-card">
  <div class="stat-icon">💪</div>
  <div class="stat-value">24</div>
  <div class="stat-label">Workouts</div>
  <div class="stat-change up">↑ +3 this week</div>
</div>
<div class="card stat-card">
  <div class="stat-icon">📚</div>
  <div class="stat-value">12h</div>
  <div class="stat-label">Study time</div>
  <div class="stat-change up">↑ +2h this week</div>
</div>
<div class="card stat-card">
  <div class="stat-icon">😴</div>
  <div class="stat-value">7.2h</div>
  <div class="stat-label">Avg sleep</div>
  <div class="stat-change down">↓ −0.3h</div>
</div>
<div class="card stat-card">
  <div class="stat-icon">💰</div>
  <div class="stat-value">$1,250</div>
  <div class="stat-label">Spending</div>
  <div class="stat-change" style="color:#64748B">this month</div>
</div>
<div class="card content-card">
  <div class="card-header">
    <div class="card-title">Upper Body</div>
    <span class="badge" style="background:#EFF6FF;color:#2563EB">Strength</span>
  </div>
  <div class="card-body">
    Bench Press 3×10<br>Pull Ups 3×8<br>
    <div style="margin-top:8px;font-size:11px;color:#94A3B8">45 min · Apr 20, 2024</div>
  </div>
</div>
</body></html>

<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); background: var(--bg); padding: 20px; }
.groups { display: flex; gap: 16px; }
.group { flex: 1; }
.group-label { font-size: 10px; font-weight: 600; color: var(--fg3); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 6px; }
.swatches { display: flex; flex-direction: column; gap: 4px; }
.swatch { border-radius: 6px; height: 40px; display: flex; align-items: center; padding: 0 10px; font-size: 11px; font-weight: 500; }
</style>
</head><body>
<div class="groups">
  <div class="group">
    <div class="group-label">Success</div>
    <div class="swatches">
      <div class="swatch" style="background:#F0FDF4;color:#15803D">Light #F0FDF4</div>
      <div class="swatch" style="background:#16A34A;color:#fff">Default #16A34A ★</div>
      <div class="swatch" style="background:#15803D;color:#fff">Dark #15803D</div>
    </div>
  </div>
  <div class="group">
    <div class="group-label">Warning</div>
    <div class="swatches">
      <div class="swatch" style="background:#FFFBEB;color:#D97706">Light #FFFBEB</div>
      <div class="swatch" style="background:#F59E0B;color:#fff">Default #F59E0B ★</div>
      <div class="swatch" style="background:#D97706;color:#fff">Dark #D97706</div>
    </div>
  </div>
  <div class="group">
    <div class="group-label">Danger</div>
    <div class="swatches">
      <div class="swatch" style="background:#FEF2F2;color:#B91C1C">Light #FEF2F2</div>
      <div class="swatch" style="background:#DC2626;color:#fff">Default #DC2626 ★</div>
      <div class="swatch" style="background:#B91C1C;color:#fff">Dark #B91C1C</div>
    </div>
  </div>
  <div class="group">
    <div class="group-label">Surfaces</div>
    <div class="swatches">
      <div class="swatch" style="background:#F8FAFC;color:#475569;border:1px solid #E2E8F0">bg #F8FAFC</div>
      <div class="swatch" style="background:#fff;color:#475569;border:1px solid #E2E8F0">surface #FFFFFF</div>
      <div class="swatch" style="background:#0F172A;color:#94A3B8">dark surface #0F172A</div>
    </div>
  </div>
</div>
</body></html>

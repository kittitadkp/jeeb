<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); background: var(--bg); padding: 20px; display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-start; }
.badge { display: inline-flex; align-items: center; gap: 4px; border-radius: 9999px; padding: 3px 10px; font-size: 12px; font-weight: 500; }
.dot { width: 6px; height: 6px; border-radius: 9999px; }
.section { display: flex; flex-direction: column; gap: 8px; }
.section-label { font-size: 10px; color: var(--fg3); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 2px; }
.row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
</style>
</head><body>
<div class="section">
  <div class="section-label">Status badges</div>
  <div class="row">
    <span class="badge" style="background:#EFF6FF;color:#2563EB"><span class="dot" style="background:#2563EB"></span>Active</span>
    <span class="badge" style="background:#F0FDF4;color:#16A34A"><span class="dot" style="background:#16A34A"></span>Completed</span>
    <span class="badge" style="background:#FFFBEB;color:#D97706"><span class="dot" style="background:#F59E0B"></span>In Progress</span>
    <span class="badge" style="background:#FEF2F2;color:#DC2626"><span class="dot" style="background:#DC2626"></span>Overdue</span>
    <span class="badge" style="background:#F1F5F9;color:#475569"><span class="dot" style="background:#94A3B8"></span>Inactive</span>
  </div>
  <div class="section-label" style="margin-top:8px">Type badges</div>
  <div class="row">
    <span class="badge" style="background:#EFF6FF;color:#2563EB">Strength</span>
    <span class="badge" style="background:#F0FDF4;color:#16A34A">Cardio</span>
    <span class="badge" style="background:#FFFBEB;color:#D97706">Flexibility</span>
    <span class="badge" style="background:#F1F5F9;color:#334155">Mathematics</span>
    <span class="badge" style="background:#FEF2F2;color:#DC2626">Bill Due</span>
  </div>
  <div class="section-label" style="margin-top:8px">Notification dot</div>
  <div class="row">
    <div style="position:relative;display:inline-flex">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#475569" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
      <span style="position:absolute;top:-3px;right:-3px;width:8px;height:8px;background:#DC2626;border-radius:9999px;border:2px solid #F8FAFC"></span>
    </div>
    <span style="font-size:13px;color:var(--fg2)">3 unread notifications</span>
  </div>
</div>
</body></html>

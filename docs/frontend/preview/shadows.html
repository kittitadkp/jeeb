<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); background: #CBD5E1; padding: 24px; display: flex; gap: 20px; align-items: flex-start; flex-wrap: wrap; }
.card { background: #fff; border-radius: 8px; padding: 16px 20px; display: flex; flex-direction: column; gap: 4px; min-width: 130px; }
.card-label { font-size: 11px; color: var(--fg3); }
.card-sample { font-size: 13px; font-weight: 500; color: var(--fg2); }
</style>
</head><body>
<div class="card" style="box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05)">
  <div class="card-label">shadow-sm</div>
  <div class="card-sample">Cards & surfaces</div>
</div>
<div class="card" style="box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.07), 0 2px 4px -2px rgb(0 0 0 / 0.05)">
  <div class="card-label">shadow-md</div>
  <div class="card-sample">Dropdowns & menus</div>
</div>
<div class="card" style="box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.08), 0 4px 6px -4px rgb(0 0 0 / 0.05)">
  <div class="card-label">shadow-lg</div>
  <div class="card-sample">Modals & dialogs</div>
</div>
<div style="margin-top:4px;background:#fff;border-radius:8px;padding:16px 20px;box-shadow:var(--shadow-sm);width:100%">
  <div style="font-size:11px;color:var(--fg3);margin-bottom:8px">Border styles</div>
  <div style="display:flex;gap:12px;flex-wrap:wrap">
    <div style="border:1px solid #E2E8F0;border-radius:8px;padding:8px 14px;font-size:12px;color:var(--fg2)">border-slate-200 (default)</div>
    <div style="border:1px solid #CBD5E1;border-radius:8px;padding:8px 14px;font-size:12px;color:var(--fg2)">border-slate-300 (strong)</div>
    <div style="border:1px solid #2563EB;border-radius:8px;padding:8px 14px;font-size:12px;color:#2563EB">border-blue-600 (focus)</div>
    <div style="border:1px solid #DC2626;border-radius:8px;padding:8px 14px;font-size:12px;color:#DC2626">border-red-600 (error)</div>
  </div>
</div>
</body></html>

<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); background: var(--bg); padding: 20px; display: flex; gap: 20px; align-items: flex-start; }
/* Sidebar */
.sidebar { width: 200px; background: #fff; border-radius: 8px; box-shadow: 0 1px 2px rgb(0 0 0/.05); padding: 12px 8px; display: flex; flex-direction: column; gap: 2px; border: 1px solid #E2E8F0; }
.nav-item { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: 6px; font-size: 14px; font-weight: 500; color: #475569; cursor: pointer; transition: background 0.1s; }
.nav-item:hover { background: #F1F5F9; }
.nav-item.active { background: #EFF6FF; color: #2563EB; }
.nav-divider { height: 1px; background: #E2E8F0; margin: 6px 0; }
.nav-icon { width: 18px; text-align: center; font-size: 15px; }
/* Header */
.header { flex: 1; background: #fff; border-radius: 8px; box-shadow: 0 1px 2px rgb(0 0 0/.05); padding: 0 16px; display: flex; align-items: center; height: 52px; gap: 12px; border: 1px solid #E2E8F0; }
.logo { font-size: 16px; font-weight: 700; color: #2563EB; margin-right: 8px; }
.search { flex: 1; border: 1px solid #E2E8F0; border-radius: 8px; padding: 6px 12px; font-size: 13px; color: #94A3B8; background: #F8FAFC; display: flex; align-items: center; gap: 6px; max-width: 240px; }
.header-actions { margin-left: auto; display: flex; align-items: center; gap: 8px; }
.icon-btn { width: 32px; height: 32px; border-radius: 6px; background: #F1F5F9; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #475569; position: relative; }
.avatar { width: 32px; height: 32px; border-radius: 9999px; background: #2563EB; color: #fff; font-size: 13px; font-weight: 600; display: flex; align-items: center; justify-content: center; }
.notif-dot { position: absolute; top: 4px; right: 4px; width: 7px; height: 7px; background: #DC2626; border-radius: 9999px; border: 2px solid #F1F5F9; }
</style>
</head><body>
<div style="display:flex;flex-direction:column;gap:12px;width:100%">
  <!-- Header -->
  <div class="header">
    <span class="logo">Jeeb</span>
    <div class="search">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      Search… <span style="margin-left:auto;font-size:11px;background:#E2E8F0;border-radius:4px;padding:1px 5px;color:#475569">⌘K</span>
    </div>
    <div class="header-actions">
      <div class="icon-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        <div class="notif-dot"></div>
      </div>
      <div class="avatar">J</div>
    </div>
  </div>
  <!-- Sidebar -->
  <div style="display:flex;gap:12px">
    <div class="sidebar">
      <div class="nav-item active"><span class="nav-icon">📊</span>Dashboard</div>
      <div class="nav-item"><span class="nav-icon">💪</span>Workouts</div>
      <div class="nav-item"><span class="nav-icon">📚</span>Study</div>
      <div class="nav-item"><span class="nav-icon">😴</span>Sleep</div>
      <div class="nav-item"><span class="nav-icon">💰</span>Finance</div>
      <div class="nav-item"><span class="nav-icon">📅</span>Calendar</div>
      <div class="nav-divider"></div>
      <div class="nav-item"><span class="nav-icon" style="font-size:14px">⚙️</span>Settings</div>
    </div>
    <div style="font-size:12px;color:var(--fg3);padding-top:8px">← Full sidebar (240px on desktop,<br>icon-only on tablet)</div>
  </div>
</div>
</body></html>

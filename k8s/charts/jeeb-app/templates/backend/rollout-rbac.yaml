apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: backend-rollout-restarter
  namespace: {{ .Values.global.namespace }}
rules:
- apiGroups: ["apps"]
  resources: ["deployments"]
  resourceNames: ["backend"]
  verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: backend-rollout-restarter
  namespace: {{ .Values.global.namespace }}
subjects:
- kind: ServiceAccount
  name: backend
  namespace: {{ .Values.global.namespace }}
roleRef:
  kind: Role
  name: backend-rollout-restarter
  apiGroup: rbac.authorization.k8s.io

{{- $envFile := .Values.backend.vault.envFile -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: {{ .Values.global.namespace }}
spec:
  replicas: {{ .Values.backend.replicas }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: backend
      imagePullSecrets:
        - name: nexus-pull-secret
      containers:
        {{- include "jeeb-app.vaultAgentContainer" (dict
            "vaultImage" .Values.backend.vaultImage
            "vaultAddr"  .Values.infra.vaultAddr) | nindent 8 }}

        - name: backend
          image: {{ .Values.global.imageRegistry }}/jeeb/backend:{{ .Values.backend.imageTag }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              until [ -f /app/env/{{ $envFile }} ]; do
                echo "waiting for vault-agent to render {{ $envFile }}..."
                sleep 2
              done
              set -a
              . /app/env/{{ $envFile }}
              set +a
              exec /app/jeeb
          workingDir: /app
          envFrom:
            - configMapRef:
                name: backend-config
          ports:
            - containerPort: 8080
          env:
            - name: SSL_CERT_FILE
              value: /etc/ssl/jeeb/tls.crt
          volumeMounts:
            - name: vault-secrets
              mountPath: /app/env
            - name: jeeb-tls
              mountPath: /etc/ssl/jeeb
              readOnly: true
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 256Mi
              cpu: 500m
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3

      volumes:
        {{- include "jeeb-app.vaultVolumes" (dict "configMapName" "vault-agent-config") | nindent 8 }}
        - name: jeeb-tls
          secret:
            secretName: jeeb-dev-tls
            items:
              - key: tls.crt
                path: tls.crt

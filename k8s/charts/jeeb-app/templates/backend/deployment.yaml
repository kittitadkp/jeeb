{{- $envFile := .Values.backend.vault.envFile -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: {{ .Values.global.namespace }}
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: backend
      imagePullSecrets:
        - name: nexus-pull-secret
      containers:
        - name: vault-agent
          image: {{ .Values.backend.vaultImage }}
          args:
            - agent
            - -config=/vault/config/agent.hcl
          env:
            - name: VAULT_ADDR
              value: {{ .Values.infra.vaultAddr | quote }}
          volumeMounts:
            - name: vault-config
              mountPath: /vault/config
            - name: vault-secrets
              mountPath: /app/env
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 128Mi
              cpu: 100m
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              add:
                - IPC_LOCK

        - name: backend
          image: {{ .Values.global.imageRegistry }}/jeeb/backend:{{ .Values.global.imageTag }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              until [ -f /app/env/{{ $envFile }} ]; do
                echo "waiting for vault-agent to render {{ $envFile }}..."
                sleep 2
              done
              set -a
              . /app/env/{{ $envFile }}
              set +a
              exec /app/jeeb
          workingDir: /app
          envFrom:
            - configMapRef:
                name: backend-config
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: vault-secrets
              mountPath: /app/env
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 256Mi
              cpu: 500m
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3

      volumes:
        - name: vault-config
          configMap:
            name: vault-agent-config
        - name: vault-secrets
          emptyDir: {}

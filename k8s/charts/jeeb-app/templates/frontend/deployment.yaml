{{- $envFile := .Values.frontend.vault.envFile -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: {{ .Values.global.namespace }}
spec:
  replicas: {{ .Values.frontend.replicas }}
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      serviceAccountName: frontend
      imagePullSecrets:
        - name: nexus-pull-secret
      containers:
        - name: vault-agent
          image: {{ .Values.frontend.vaultImage }}
          args:
            - agent
            - -config=/vault/config/agent.hcl
          env:
            - name: VAULT_ADDR
              value: {{ .Values.infra.vaultAddr | quote }}
          volumeMounts:
            - name: vault-config
              mountPath: /vault/config
            - name: vault-secrets
              mountPath: /app/env
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 128Mi
              cpu: 100m
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              add:
                - IPC_LOCK

        - name: frontend
          image: {{ .Values.global.imageRegistry }}/jeeb/frontend:{{ .Values.global.imageTag }}
          ports:
            - containerPort: 80
          volumeMounts:
            - name: vault-secrets
              mountPath: /app/env
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 128Mi
              cpu: 200m
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 20
            periodSeconds: 15
            failureThreshold: 3

      volumes:
        - name: vault-config
          configMap:
            name: vault-agent-config-frontend
        - name: vault-secrets
          emptyDir: {}

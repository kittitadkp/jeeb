{{- $envFile := .Values.frontend.vault.envFile -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: {{ .Values.global.namespace }}
spec:
  replicas: {{ .Values.frontend.replicas }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      serviceAccountName: frontend
      imagePullSecrets:
        - name: nexus-pull-secret
      containers:
        {{- include "jeeb-app.vaultAgentContainer" (dict
            "vaultImage" .Values.frontend.vaultImage
            "vaultAddr"  .Values.infra.vaultAddr) | nindent 8 }}

        - name: frontend
          image: {{ .Values.global.imageRegistry }}/jeeb/frontend:{{ .Values.frontend.imageTag }}
          ports:
            - containerPort: 80
          volumeMounts:
            - name: vault-secrets
              mountPath: /app/env
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 128Mi
              cpu: 200m
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 20
            periodSeconds: 15
            failureThreshold: 3

      volumes:
        {{- include "jeeb-app.vaultVolumes" (dict "configMapName" "vault-agent-config-frontend") | nindent 8 }}

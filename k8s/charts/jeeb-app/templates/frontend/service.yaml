apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: {{ .Values.global.namespace }}
spec:
  type: {{ .Values.global.serviceType }}
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
      {{- if eq .Values.global.serviceType "NodePort" }}
      nodePort: {{ .Values.frontend.nodePort }}
      {{- end }}

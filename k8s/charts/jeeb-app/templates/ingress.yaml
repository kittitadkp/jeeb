apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: jeeb-app-ingress
  namespace: {{ .Values.global.namespace }}
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    {{- with .Values.ingress.cors }}
    {{- if .enabled }}
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: {{ .allowOrigin | quote }}
    nginx.ingress.kubernetes.io/cors-allow-methods: {{ .allowMethods | quote }}
    nginx.ingress.kubernetes.io/cors-allow-headers: {{ .allowHeaders | quote }}
    nginx.ingress.kubernetes.io/cors-allow-credentials: {{ .allowCredentials | quote }}
    {{- end }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  tls:
    - hosts:
        - {{ .Values.global.domain }}
        - "*.{{ .Values.global.domain }}"
      secretName: jeeb-dev-tls
  rules:
    - host: {{ .Values.global.domain }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80

    - host: api.{{ .Values.global.domain }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8080


global:
  env: dev
  namespace: jeeb-dev
  domain: jeeb-dev.local
  imageRegistry: localhost:30050
  serviceType: NodePort

ingress:
  className: nginx
  cors:
    enabled: false
    allowOrigin: ""
    allowMethods: "GET, POST, PUT, PATCH, DELETE, OPTIONS"
    allowHeaders: "Authorization, Content-Type, Accept, Origin, X-Requested-With"
    allowCredentials: "true"

mongodb:
  database: jeeb
  credentials:
    username: jeeb
    password: ""

backend:
  replicas: 1
  nodePort: 30080
  imageTag: latest
  vaultImage: hashicorp/vault:1.17
  vault:
    path: secret/data/jeeb/backend/develop
    envFile: .env.develop
    role: backend

frontend:
  replicas: 1
  nodePort: 30000
  imageTag: latest
  vaultImage: hashicorp/vault:1.17
  vault:
    path: secret/data/jeeb/frontend/develop
    envFile: .env.develop
    role: frontend

infra:
  vaultAddr: "http://vault.jeeb-infra.svc.cluster.local:8200"

global:
  namespace: jeeb-dev
  serviceType: NodePort

ingress:
  className: nginx
  domain: jeeb-dev.local

mongodb:
  image: mongo:7
  storageSize: 5Gi
  nodePort: 30017
  database: jeeb
  credentials:
    username: jeeb
    password: ""

keycloak:
  image: quay.io/keycloak/keycloak:24.0
  storageSize: 1Gi
  nodePort: 30081
  hostnameUrl: http://auth.jeeb-dev.local
  credentials:
    adminUser: admin
    adminPassword: ""

nexus:
  # generated by k8s-manager from nexus.adminPassword in credentials.yaml
  dockerConfigJson: ""

{{- $envFile := .Values.frontend.vault.envFile -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: learning-frontend
  namespace: {{ .Values.global.namespace }}
spec:
  replicas: {{ .Values.frontend.replicas }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: learning-frontend
  template:
    metadata:
      labels:
        app: learning-frontend
      annotations:
        checksum/vault-config: {{ include (print $.Template.BasePath "/frontend/vault-agent-config.yaml") . | sha256sum }}
    spec:
      serviceAccountName: learning-frontend
      imagePullSecrets:
        - name: nexus-pull-secret
      initContainers:
        {{- include "jeeb-learning.vaultKubectlInitContainer" . | nindent 8 }}
      containers:
        {{- include "jeeb-learning.vaultAgentContainer" (dict
            "vaultImage" .Values.frontend.vaultImage
            "vaultAddr"  .Values.infra.vaultAddr) | nindent 8 }}

        - name: learning-frontend
          image: {{ .Values.global.imageRegistry }}/jeeb/learning-frontend:{{ .Values.frontend.imageTag }}
          imagePullPolicy: {{ .Values.frontend.pullPolicy }}
          env:
            - name: VAULT_ENV_FILE
              value: "/app/env/{{ $envFile }}"
            - name: VAULT_ENV_WAIT_SECONDS
              value: "60"
          ports:
            - containerPort: 80
          volumeMounts:
            - name: vault-secrets
              mountPath: /app/env
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 128Mi
              cpu: 200m
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 20
            periodSeconds: 15
            failureThreshold: 3

      volumes:
        {{- include "jeeb-learning.vaultVolumes" (dict "configMapName" "learning-frontend-vault-agent-config") | nindent 8 }}

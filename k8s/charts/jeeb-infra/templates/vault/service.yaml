apiVersion: v1
kind: Service
metadata:
  name: vault
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: vault
  type: NodePort
  ports:
    - name: api
      port: 8200
      targetPort: 8200
      nodePort: {{ .Values.vault.nodePort }}
    - name: cluster
      port: 8201
      targetPort: 8201

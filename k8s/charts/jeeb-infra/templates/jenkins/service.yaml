apiVersion: v1
kind: Service
metadata:
  name: jenkins
  namespace: {{ .Values.namespace }}
spec:
  type: NodePort
  selector:
    app: jenkins
  ports:
    - name: web
      port: 8080
      targetPort: 8080
      nodePort: {{ .Values.jenkins.nodePort }}
    - name: agent
      port: 50000
      targetPort: 50000
      nodePort: {{ .Values.jenkins.agentNodePort }}

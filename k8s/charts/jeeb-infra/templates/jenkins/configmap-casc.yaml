apiVersion: v1
kind: ConfigMap
metadata:
  name: jenkins-casc
  namespace: {{ .Values.namespace }}
data:
  jenkins.yaml: |
    jenkins:
      systemMessage: "Jeeb CI/CD"
      clouds:
        - kubernetes:
            name: "kubernetes"
            serverUrl: "https://kubernetes.default.svc"
            namespace: "{{ .Values.namespace }}"
            jenkinsUrl: "http://jenkins.{{ .Values.namespace }}.svc.cluster.local:8080"
            jenkinsTunnel: "jenkins.{{ .Values.namespace }}.svc.cluster.local:50000"
            connectTimeout: 5
            readTimeout: 15
            containerCapStr: "10"
            retentionTimeout: 5
            waitForPodSec: 600
      securityRealm:
        local:
          allowsSignup: false
          users:
            - id: "admin"
              password: "${JENKINS_ADMIN_PASSWORD}"
      authorizationStrategy:
        loggedInUsersCanDoAnything:
          allowAnonymousRead: false
    credentials:
      system:
        domainCredentials:
          - credentials:
              - usernamePassword:
                  scope: GLOBAL
                  id: "github-creds"
                  username: "${GITHUB_USER}"
                  password: "${GITHUB_PAT}"
                  description: "GitHub PAT"
              - usernamePassword:
                  scope: GLOBAL
                  id: "nexus-docker-secret"
                  username: "${NEXUS_USER}"
                  password: "${NEXUS_PASS}"
                  description: "Nexus Docker Registry"
              - string:
                  scope: GLOBAL
                  id: "sonar-token"
                  secret: "${SONAR_TOKEN}"
                  description: "SonarQube API Token"
    unclassified:
      globalLibraries:
        libraries:
          - name: "jeeb-jenkins"
            defaultVersion: "main"
            implicit: true
            allowVersionOverride: false
            retriever:
              modernSCM:
                scm:
                  git:
                    remote: "{{ .Values.jenkins.jenkinsRepo }}"
                    credentialsId: "github-creds"
    security:
      globalJobDslSecurityConfiguration:
        useScriptSecurity: false
    jobs:
      - script: |
          freeStyleJob('jeeb-seed') {
            description('Seed job - creates all jeeb pipelines from jobs/seed.groovy')
            scm {
              git {
                remote {
                  url('{{ .Values.jenkins.jenkinsRepo }}')
                  credentials('github-creds')
                }
                branches('*/main')
                extensions { cleanBeforeCheckout() }
              }
            }
            triggers {
              scm('H/5 * * * *')
            }
            steps {
              jobDsl {
                targets('jobs/seed.groovy')
                sandbox(false)
                ignoreExisting(false)
              }
            }
          }

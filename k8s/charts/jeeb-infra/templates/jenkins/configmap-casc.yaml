apiVersion: v1
kind: ConfigMap
metadata:
  name: jenkins-casc
  namespace: {{ .Values.namespace }}
data:
  jenkins.yaml: |
    jenkins:
      systemMessage: "Jeeb CI/CD"
      clouds:
        - kubernetes:
            name: "kubernetes"
            serverUrl: "https://kubernetes.default.svc"
            namespace: "{{ .Values.namespace }}"
            jenkinsUrl: "http://jenkins.{{ .Values.namespace }}.svc.cluster.local:8080"
            jenkinsTunnel: "jenkins.{{ .Values.namespace }}.svc.cluster.local:50000"
            connectTimeout: 5
            readTimeout: 15
            containerCapStr: "10"
            retentionTimeout: 5
            waitForPodSec: 600
      securityRealm:
        local:
          allowsSignup: false
          users:
            - id: "admin"
              password: "${JENKINS_ADMIN_PASSWORD}"
      authorizationStrategy:
        loggedInUsersCanDoAnything:
          allowAnonymousRead: false
    credentials:
      system:
        domainCredentials:
          - credentials:
              - usernamePassword:
                  scope: GLOBAL
                  id: "github-creds"
                  username: "${GITHUB_USER}"
                  password: "${GITHUB_PAT}"
                  description: "GitHub PAT"
              - usernamePassword:
                  scope: GLOBAL
                  id: "nexus-docker-secret"
                  username: "${NEXUS_USER}"
                  password: "${NEXUS_PASS}"
                  description: "Nexus Docker Registry"
              - string:
                  scope: GLOBAL
                  id: "sonar-token"
                  secret: "${SONAR_TOKEN}"
                  description: "SonarQube API Token"
    unclassified:
      globalLibraries:
        libraries:
          - name: "jeeb-jenkins"
            defaultVersion: "main"
            implicit: true
            allowVersionOverride: false
            retriever:
              modernSCM:
                scm:
                  git:
                    remote: "{{ .Values.jenkins.jenkinsRepo }}"
                    credentialsId: "github-creds"
    security:
      globalJobDslSecurityConfiguration:
        useScriptSecurity: false
    jobs:
      - script: |
          freeStyleJob('jeeb-seed') {
            description('Seed job - creates all jeeb pipelines (inline, no SCM pull)')
            steps {
              jobDsl {
                scriptText('''
                  import jenkins.model.Jenkins

                  def stale = Jenkins.instance.getItem('seed')
                  if (stale) { stale.delete() }

                  folder('dev') {
                    description('DEV environment pipelines')
                  }

                  def pipelines = [
                    [name: 'jeeb-backend',           path: 'pipelines/backend/Jenkinsfile',           gitUrl: '{{ .Values.jenkins.repos.backend }}'],
                    [name: 'jeeb-frontend',          path: 'pipelines/frontend/Jenkinsfile',          gitUrl: '{{ .Values.jenkins.repos.frontend }}'],
                    [name: 'jeeb-learning-backend',  path: 'pipelines/learning-backend/Jenkinsfile',  gitUrl: '{{ .Values.jenkins.repos.learningBackend }}'],
                    [name: 'jeeb-learning-frontend', path: 'pipelines/learning-frontend/Jenkinsfile', gitUrl: '{{ .Values.jenkins.repos.learningFrontend }}'],
                  ]

                  pipelines.each { p ->
                    pipelineJob("dev/${p.name}") {
                      description("${p.name} pipeline - dev")
                      parameters {
                        stringParam('BRANCH', 'main', 'Branch to build')
                        stringParam('GIT_URL', p.gitUrl, 'Repository URL')
                        stringParam('HELM_RELEASE', 'jeeb-dev', 'Helm release name')
                        stringParam('DEPLOY_NAMESPACE', 'jeeb-dev', 'Deploy namespace')
                        booleanParam('SKIP_SONAR', true, 'Skip Test & SonarQube stage')
                      }
                      definition {
                        cpsScm {
                          scm {
                            git {
                              remote {
                                url('{{ .Values.jenkins.jenkinsRepo }}')
                                credentials('github-creds')
                              }
                              branches('*/main')
                              extensions { cleanBeforeCheckout() }
                            }
                          }
                          scriptPath(p.path)
                          lightweight(true)
                        }
                      }
                    }
                  }
                ''')
                sandbox(false)
                ignoreExisting(false)
              }
            }
          }

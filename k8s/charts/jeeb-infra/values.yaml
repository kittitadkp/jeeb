namespace: jeeb-infra

kong:
  image: kong:3.9
  nodePort: 30088
  appNamespace: jeeb-dev
  # Token iss claim — must match exactly what Keycloak puts in the JWT.
  keycloakIssuer: "http://auth.jeeb-dev.local/realms/jeeb"
  # RS256 public key in PEM format — set via credentials.yaml, injected by k8s-manager.
  keycloakPublicKey: ""

vault:
  image: hashicorp/vault:1.17
  storageSize: 2Gi
  nodePort: 30091
  clusterName: jeeb-infra

jenkins:
  image: jenkins/jenkins:lts-jdk17
  storageSize: 5Gi
  nodePort: 30082
  agentNodePort: 30500
  jenkinsRepo: "https://github.com/kittitadkp/jeeb-jenkins.git"
  credentials:
    adminPassword: ""
    githubUser: ""
    githubPat: ""
    nexusUser: "admin"
    nexusPat: ""
    sonarToken: ""
  plugins:
    - git
    - git-client
    - workflow-aggregator
    - pipeline-model-definition
    - workflow-scm-step
    - workflow-cps
    - workflow-job
    - job-dsl
    - configuration-as-code
    - kubernetes
    - pipeline-stage-view
    - timestamper
    - ansicolor
    - build-timeout
    - ws-cleanup
    - sonar
    - github
    - github-branch-source

nexus:
  image: sonatype/nexus3:latest
  storageSize: 10Gi
  uiNodePort: 30083
  registryNodePort: 30050

sonarqube:
  image: sonarqube:10-community
  storageSize: 5Gi
  nodePort: 30090

ingress:
  className: nginx
  hosts:
    vault: vault.jeeb.local
    jenkins: jenkins.jeeb.local
    nexus: nexus.jeeb.local
    sonarqube: sonarqube.jeeb.local

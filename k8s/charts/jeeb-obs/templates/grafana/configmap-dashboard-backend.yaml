apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-backend
  namespace: {{ .Values.namespace }}
data:
  backend.json: |
    {
      "title": "Jeeb Backend",
      "uid": "jeeb-backend",
      "tags": ["jeeb"],
      "timezone": "browser",
      "refresh": "30s",
      "schemaVersion": 39,
      "templating": {
        "list": [
          {
            "name": "env",
            "label": "Environment",
            "type": "custom",
            "options": [
              {"text": "dev", "value": "dev"},
              {"text": "uat", "value": "uat"}
            ],
            "current": {"text": "dev", "value": "dev"}
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "title": "Request Rate (req/s)",
          "type": "timeseries",
          "gridPos": {"x": 0, "y": 0, "w": 12, "h": 8},
          "targets": [
            {
              "datasource": {"uid": "prometheus"},
              "expr": "sum(rate(http_requests_total{env=\"$env\"}[1m])) by (method, route)",
              "legendFormat": "{{ "{{" }}method{{ "}}" }} {{ "{{" }}route{{ "}}" }}"
            }
          ]
        },
        {
          "id": 2,
          "title": "Error Rate (5xx %)",
          "type": "timeseries",
          "gridPos": {"x": 12, "y": 0, "w": 12, "h": 8},
          "targets": [
            {
              "datasource": {"uid": "prometheus"},
              "expr": "sum(rate(http_requests_total{env=\"$env\",status_code=~\"5..\"}[1m])) / sum(rate(http_requests_total{env=\"$env\"}[1m])) * 100",
              "legendFormat": "5xx %"
            }
          ]
        },
        {
          "id": 3,
          "title": "Latency P50 / P95 / P99 (ms)",
          "type": "timeseries",
          "gridPos": {"x": 0, "y": 8, "w": 12, "h": 8},
          "targets": [
            {
              "datasource": {"uid": "prometheus"},
              "expr": "histogram_quantile(0.50, sum(rate(http_request_duration_seconds_bucket{env=\"$env\"}[1m])) by (le)) * 1000",
              "legendFormat": "P50"
            },
            {
              "datasource": {"uid": "prometheus"},
              "expr": "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{env=\"$env\"}[1m])) by (le)) * 1000",
              "legendFormat": "P95"
            },
            {
              "datasource": {"uid": "prometheus"},
              "expr": "histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket{env=\"$env\"}[1m])) by (le)) * 1000",
              "legendFormat": "P99"
            }
          ]
        },
        {
          "id": 4,
          "title": "In-Flight Requests",
          "type": "stat",
          "gridPos": {"x": 12, "y": 8, "w": 6, "h": 8},
          "targets": [
            {
              "datasource": {"uid": "prometheus"},
              "expr": "sum(http_requests_in_flight{env=\"$env\"})",
              "legendFormat": "in-flight"
            }
          ]
        },
        {
          "id": 5,
          "title": "Goroutines",
          "type": "stat",
          "gridPos": {"x": 18, "y": 8, "w": 6, "h": 8},
          "targets": [
            {
              "datasource": {"uid": "prometheus"},
              "expr": "go_goroutines{job=~\"jeeb-backend-$env\"}",
              "legendFormat": "goroutines"
            }
          ]
        },
        {
          "id": 6,
          "title": "Logs (backend)",
          "type": "logs",
          "gridPos": {"x": 0, "y": 16, "w": 24, "h": 10},
          "options": {
            "dedupStrategy": "none",
            "showLabels": false,
            "showTime": true,
            "wrapLogMessage": false
          },
          "targets": [
            {
              "datasource": {"uid": "loki"},
              "expr": "{namespace=\"jeeb-$env\",app=\"backend\"}",
              "legendFormat": ""
            }
          ]
        },
        {
          "id": 7,
          "title": "Recent Traces",
          "type": "traces",
          "gridPos": {"x": 0, "y": 26, "w": 24, "h": 10},
          "targets": [
            {
              "datasource": {"uid": "tempo"},
              "queryType": "traceql",
              "query": "{resource.service.name=\"jeeb-backend\"}",
              "limit": 20
            }
          ]
        }
      ]
    }


apiVersion: v1
kind: ConfigMap
metadata:
  name: coredns
  namespace: kube-system
data:
  Corefile: |
    .:53 {
        errors
        health {
           lameduck 5s
        }
        ready
        hosts {
           10.109.28.106 jeeb-dev.local api.jeeb-dev.local auth.jeeb-dev.local learning.jeeb-dev.local
           10.109.28.106 jenkins.jeeb.local nexus.jeeb.local sonarqube.jeeb.local vault.jeeb.local
           10.109.28.106 grafana.jeeb.local
           10.109.28.106 rancher.jeeb-infra.local
           fallthrough
        }
        kubernetes cluster.local in-addr.arpa ip6.arpa {
           pods insecure
           fallthrough in-addr.arpa ip6.arpa
           ttl 30
        }
        prometheus :9153
        forward . /etc/resolv.conf {
           max_concurrent 1000
        }
        cache 30 {
           disable success cluster.local
           disable denial cluster.local
        }
        loop
        reload
        loadbalance
    }

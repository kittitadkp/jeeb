apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: jeeb-selfsigned
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: jeeb-dev-wildcard
  namespace: jeeb-dev
spec:
  secretName: jeeb-dev-tls
  issuerRef:
    name: jeeb-selfsigned
    kind: ClusterIssuer
  commonName: "jeeb-dev.local"
  dnsNames:
    - "jeeb-dev.local"
    - "*.jeeb-dev.local"

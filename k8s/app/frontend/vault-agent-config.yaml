apiVersion: v1
kind: ConfigMap
metadata:
  name: vault-agent-config-frontend
  namespace: jeeb
data:
  agent.hcl: |
    vault {
      address = "http://vault.jeeb.svc.cluster.local:8200"
    }

    auto_auth {
      method "kubernetes" {
        mount_path = "auth/kubernetes"
        config = {
          role = "frontend"
        }
      }

      sink "file" {
        config = {
          path = "/app/env/.vault-token"
        }
      }
    }

    template {
      source      = "/vault/config/env-develop.tpl"
      destination = "/app/env/.env.develop"
      perms       = "0640"
    }

  env-develop.tpl: |
    {{- with secret "secret/data/jeeb/frontend/develop" -}}
    VITE_KEYCLOAK_URL={{ .Data.data.VITE_KEYCLOAK_URL }}
    VITE_KEYCLOAK_REALM={{ .Data.data.VITE_KEYCLOAK_REALM }}
    VITE_KEYCLOAK_CLIENT_ID={{ .Data.data.VITE_KEYCLOAK_CLIENT_ID }}
    VITE_API_URL={{ .Data.data.VITE_API_URL }}
    {{- end }}

services:
  nexus:
    image: sonatype/nexus3:latest
    container_name: jeeb-nexus
    restart: unless-stopped
    ports:
      - "8083:8081"   # Nexus UI
      - "5000:5000"   # Docker hosted registry (configured inside Nexus)
    volumes:
      - nexus-data:/nexus-data
    environment:
      INSTALL4J_ADD_VM_PARAMS: "-Xms512m -Xmx1024m -XX:MaxDirectMemorySize=512m"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/service/rest/v1/status"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 3m

volumes:
  nexus-data:

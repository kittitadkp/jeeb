sonar.projectKey=jeeb
sonar.projectName=Jeeb
sonar.projectVersion=1.0

sonar.host.url=http://localhost:9000

# Source directories (relative to this file)
sonar.sources=backend,frontend/src

# Test inclusions
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

# Exclusions
sonar.exclusions=\
  **/node_modules/**,\
  **/vendor/**,\
  **/dist/**,\
  **/build/**,\
  **/.next/**,\
  **/coverage/**

# Go coverage (generate with: cd backend && go test ./... -coverprofile=coverage.out)
sonar.go.coverage.reportPaths=backend/coverage.out

# TypeScript/JavaScript coverage (generate with: cd frontend && npm run test -- --coverage)
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info
sonar.typescript.tsconfigPath=frontend/tsconfig.json

sonar.sourceEncoding=UTF-8
